<section class="relative min-h-screen overflow-hidden bg-slate-950 px-6 py-20 text-white">
  <!-- Background spatial -->
  <div class="absolute inset-0 bg-[radial-gradient(circle_at_top,#1e293b_0%,#020617_65%)]"></div>

  <!-- Glow portail -->
  <div
    class="absolute left-1/2 top-0 h-[500px] w-[500px] -translate-x-1/2 rounded-full bg-green-400/10 blur-[150px]"
  ></div>

  <!-- Contenu -->
  <div class="relative z-10 mx-auto max-w-7xl">
    <!-- Header de page -->
    <div class="mb-16 text-center">
      <span
        class="rounded-full border border-green-400/30 bg-green-400/10 px-4 py-2 text-sm uppercase tracking-[0.3em] text-green-300"
      >
        Multiverse Database
      </span>

      <h1 class="mt-6 text-5xl font-black md:text-6xl">
        Personnages du
        <span
          class="bg-gradient-to-r from-green-300 via-cyan-300 to-green-400 bg-clip-text text-transparent"
        >
          multivers
        </span>
      </h1>

      <p class="mx-auto mt-6 max-w-2xl text-lg text-slate-300">
        Découvrez les personnages et créatures rencontrées au cours des voyages interdimensionnels.
      </p>
    </div>

    <!-- Barre de recherche + filtres -->
    <div class="mb-10 flex flex-col gap-4 rounded-3xl border border-green-400/20 bg-slate-900/60 p-6 backdrop-blur-xl md:flex-row md:items-center md:justify-between">
      <!-- Recherche par nom : synchronisée avec searchTerm(), lance la recherche sur Entrée -->
      <input
        type="text"
        [(ngModel)]="searchTerm"
        (keyup.enter)="applyFilters()"
        placeholder="Rechercher un personnage..."
        class="w-full rounded-full border border-slate-700 bg-slate-950 px-5 py-3 text-white placeholder:text-slate-500 focus:border-green-400 focus:outline-none md:max-w-xs"
      />

      <div class="flex flex-wrap gap-3">
        <!-- Chaque select est lié à son propre signal de filtre -->
        <select
          [(ngModel)]="statusFilter"
          class="rounded-full border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white focus:border-green-400 focus:outline-none"
        >
          <option value="">Statut</option>
          <option value="alive">Vivant</option>
          <option value="dead">Mort</option>
          <option value="unknown">Inconnu</option>
        </select>

        <select
          [(ngModel)]="speciesFilter"
          class="rounded-full border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white focus:border-green-400 focus:outline-none"
        >
          <option value="">Espèce</option>
          <option value="human">Humain</option>
          <option value="alien">Alien</option>
        </select>

        <select
          [(ngModel)]="genderFilter"
          class="rounded-full border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-white focus:border-green-400 focus:outline-none"
        >
          <option value="">Genre</option>
          <option value="male">Mâle</option>
          <option value="female">Femelle</option>
          <option value="genderless">Sans genre</option>
          <option value="unknown">Inconnu</option>
        </select>

        <!-- Appelle applyFilters() -->
        <button
          (click)="applyFilters()"
          class="rounded-full border border-green-400/40 bg-green-400/10 px-6 py-3 text-sm font-semibold text-green-300 transition hover:bg-green-400/20"
        >
          Rechercher
        </button>

        <!-- Appelle resetFilters -->
        <button
          (click)="resetFilters()"
          class="rounded-full border border-slate-700 px-6 py-3 text-sm font-semibold text-slate-300 transition hover:border-slate-500"
        >
          Réinitialiser
        </button>
      </div>
    </div>

    <!-- Cards -->
    <!-- Pagination générique, réutilisée depuis les 3 features -->
    <app-pagination [currentPage]="currentPage()" [totalPages]="totalPage()" (changePage)="changePage($event)" />
    <div class="grid grid-cols-1 gap-8 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4">
      <!-- characters() pointe sur le signal du service : se met à jour automatiquement après une recherche -->
      @for (character of characters(); track character.id) {
        <app-character-card [character]="character" />
      }
    </div>
  </div>
</section>

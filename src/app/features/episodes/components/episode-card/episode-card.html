<article
  class="group relative flex h-full flex-col overflow-hidden rounded-3xl border border-purple-400/20 bg-slate-900/70 shadow-xl backdrop-blur-xl transition duration-500 hover:-translate-y-2 hover:border-purple-400/60 hover:shadow-[0_0_40px_rgba(192,132,252,0.25)]"
>
  <div
    class="absolute -right-20 -top-20 h-48 w-48 rounded-full bg-purple-400/10 blur-3xl transition group-hover:bg-purple-400/20"
  ></div>

  <div class="relative flex flex-1 flex-col p-6">
    <span class="text-xs uppercase tracking-[0.25em] text-slate-400">
      {{ episode().episode }}
    </span>

    <h2 class="mt-3 line-clamp-1 text-2xl font-black text-white">
      {{ episode().name }}
    </h2>

    <div class="mt-6 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-slate-400">Diffusion</span>
        <span class="font-semibold text-purple-300">
          {{ episode().air_date }}
        </span>
      </div>
    </div>

    <div class="mt-6 flex items-center justify-between border-t border-slate-700 pt-4">
      <span class="text-sm text-slate-400">
        {{ episode().characters.length }} personnage(s)
      </span>
    </div>
  </div>
</article>

<article
  class="group relative flex h-full flex-col overflow-hidden rounded-3xl border border-cyan-400/20 bg-slate-900/70 shadow-xl backdrop-blur-xl transition duration-500 hover:-translate-y-2 hover:border-cyan-400/60 hover:shadow-[0_0_40px_rgba(34,211,238,0.25)]"
>
  <div
    class="absolute -right-20 -top-20 h-48 w-48 rounded-full bg-cyan-400/10 blur-3xl transition group-hover:bg-cyan-400/20"
  ></div>

  <div class="relative flex flex-1 flex-col p-6">
    <span class="text-xs uppercase tracking-[0.25em] text-slate-400">
      {{ location().type || 'Unknown' }}
    </span>

    <h2 class="mt-3 line-clamp-1 text-2xl font-black text-white">
      {{ location().name }}
    </h2>

    <div class="mt-6 space-y-4">
      <div class="flex items-center justify-between">
        <span class="text-slate-400">Dimension</span>
        <span class="line-clamp-1 max-w-[60%] text-right font-semibold text-cyan-300">
          {{ location().dimension }}
        </span>
      </div>
    </div>

    <!-- Bouton cliquable pour afficher la liste des résidents -->
    <button
      (click)="toggleResidents()"
      [disabled]="location().residents.length === 0"
      class="mt-6 flex w-full items-center justify-between border-t border-slate-700 pt-4 text-left transition disabled:cursor-not-allowed disabled:opacity-50"
    >
      <span class="text-sm text-slate-400">
        {{ location().residents.length }} habitant(s)
      </span>
      @if (location().residents.length > 0) {
        <span class="text-cyan-300 transition" [class.rotate-180]="isExpanded()">▾</span>
      }
    </button>

    <!-- Bloc déroulant -->
    @if (isExpanded()) {
      <div class="mt-3 max-h-48 space-y-1 overflow-y-auto rounded-xl bg-slate-950/60 p-3">
        @if (isLoadingResidents()) {
          <p class="text-sm text-slate-400">Chargement...</p>
        } @else {
          @for (name of residentsNames(); track name) {
            <p class="text-sm text-slate-300">{{ name }}</p>
          }
        }
      </div>
    }
  </div>
</article>
